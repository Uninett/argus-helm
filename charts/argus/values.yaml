# Default values for argus.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/uninett/argus
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: 2.7.0

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "haproxy"
  annotations: {}
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: argus.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: argus-tls
  #    hosts:
  #      - argus.local

readinessProbe: null
livenessProbe: null

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

postgresql:
  enabled: true
  global:
    postgresql:
      auth:
        database: "argus"
        username: "argus"
        password: ""
        existingSecret: ""
        secretKeys:
          userPasswordKey: ""
      service:
        ports:
          postgresql: 5432

argus:
  # This is the port that Argus will listen on. This also configuers which port the container listens to, since they have to match.
  port: 8000
  staticRoot: "/static/"
  debug: "true"
  djangoSettingsModule : "argus.site.settings.dockerdev"
  frontendUrl: "http://localhost:8000"
  timeZone: "Europe/Oslo"
  databasePort: 5432
  emailHost: "email.example.com"
  emailPort: 587
  emailUseTLS: "true"
  defaultFromEmail: "noreply@example.com"
  databaseName: "argus"
  loggingModule: ""

  # Only used if postgresql.enabled is false, otherwise the
  # chart will auto generate hostname for the dependency
  databaseHost: "my-postgres.com"

  # These are used if you do not want to use existing Kubernetes secrets
  djangoSecret: "change-me"
  argusUsername: "admin"
  argusPassword: "admin"
  databaseUsername: "argus"
  databasePassword: "argus"
  rtToken: "change-me"

  databaseExistingSecret: ""
  argusExistingSecret: ""
  rtExistingSecret: ""
  secretKeys:
    # overrides argus.databaseUsername. Only used if databaseExistingSecret is set.
    databaseUsernameKey: "username"
    # overrides argus.databasePassword. Only used if databaseExistingSecret is set.
    databasePasswordKey: "password"
    # overrides argus.djangoSecret. Only used if argusExistingSecret is set.
    djangoSecretKey: "djangosecret"
    # overrides argus.argusUsername. Only used if argusExistingSecret is set.
    argusUsernameKey: "username"
    # overrides argus.argusPassword. Only used if argusExistingSecret is set.
    argusPasswordKey: "password"
    # overrides argus.rtToken. Only used if rtExistingSecret is set
    rtTokenKey: "token"
  sso:
    redirectIsHTTPS: true
    OIDCEndpoint: "https://auth.dataporten.no"
    OIDCUsernameKey: "email"
    OIDCScope: "userid-feide"

    dataportenKey: "change-me"
    dataportenSecret: "change-me"
    dataportenEmailKey: "change-me"
    dataportenEmailSecret: "change-me"
    dataportenFeideKey: "change-me"
    dataportenFeideSecret: "change-me"
    OIDCKey: "change-me"
    OIDCSecret: "change-me"

    existingSecret: ""
    secretKeys:
      # overrides argus.sso.dataportenKey. Only used if argus.sso.existingSecret is set.
      dataportenKeyKey: "change-me"
      # overrides argus.sso.dataportenSecret. Only used if argus.sso.existingSecret is set.
      dataportenSecretKey: "change-me"
      # overrides argus.sso.dataportenEmailKey. Only used if argus.sso.existingSecret is set.
      dataportenEmailKeyKey: "change-me"
      # overrides argus.sso.dataportenEmailSecret. Only used if argus.sso.existingSecret is set.
      dataportenEmailSecretKey: "change-me"
      # overrides argus.sso.dataportenFeideKey. Only used if argus.sso.existingSecret is set.
      dataportenFeideKeyKey: "change-me"
      # overrides argus.sso.dataportenFeideSecret. Only used if argus.sso.existingSecret is set.
      dataportenFeideSecretKey: "change-me"
      # overrides argus.sso.OIDCKey. Only used if argus.sso.existingSecret is set.
      OIDCKeyKey: "change-me"
      # overrides argus.sso.OIDCSecret. Only used if argus.sso.existingSecret is set.
      OIDCSecretKey: "change-me"
